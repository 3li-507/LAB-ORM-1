{% extends 'main/base.html' %}
{% load static %}

{% block title %}Update — {{ post.title }}{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">

    <div class="blogger-page-header">
      <h1 class="blogger-page-title">
        <i class="bi bi-pencil-square me-2 text-gold"></i>Update Post
      </h1>
      <p class="blogger-page-sub">Edit your post content below.</p>
    </div>

    <div class="blogger-form-card">
      <form method="POST" action="{% url 'main:update_post_view' post.pk %}" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Title -->
        <div class="mb-4">
          <label class="blogger-field-label" for="title">
            <i class="bi bi-fonts me-1"></i>Post Title
          </label>
          <input
            type="text"
            id="title"
            name="title"
            class="blogger-field-input"
            maxlength="2048"
            value="{{ post.title }}"
            required
          >
        </div>

        <!-- Content -->
        <div class="mb-4">
          <label class="blogger-field-label" for="content">
            <i class="bi bi-body-text me-1"></i>Content
          </label>
          <textarea
            id="content"
            name="content"
            class="blogger-field-textarea"
            required
          >{{ post.content }}</textarea>
        </div>

        <!-- Poster -->
        <div class="mb-4">
          <label class="blogger-field-label">
            <i class="bi bi-image me-1"></i>Change Image (optional)
          </label>
          {% if post.poster %}
          <img src="{{ post.poster.url }}" class="update-preview-img d-block mb-2">
          {% endif %}
          <input type="file" name="poster" class="form-control">
        </div>

        <hr class="blogger-divider">

        <div class="d-flex align-items-center gap-3">
          <button type="submit" class="btn blogger-btn-gold blogger-btn-lg">
            <i class="bi bi-check-lg me-2"></i>Save Changes
          </button>
          <a href="{% url 'main:detail_post_view' post.pk %}" style="color:var(--text-muted); font-size:0.9rem;">
            <i class="bi bi-x-lg me-1"></i>Cancel
          </a>
        </div>

      </form>
    </div>

  </div>
</section>
{% endblock %}
