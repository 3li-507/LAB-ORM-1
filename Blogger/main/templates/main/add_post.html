{% extends 'main/base.html' %}
{% load static %}

{% block title %}Blogger — New Post{% endblock %}

{% block content %}

<section class="py-5">
  <div class="container">

    <!-- Page Header -->
    <div class="blogger-page-header">
      <h1 class="blogger-page-title">
        <i class="bi bi-pencil-square me-2 text-gold"></i>Write a New Post
      </h1>
      <p class="blogger-page-sub">Share your thoughts with the world.</p>
    </div>

    <!-- Form Card -->
    <div class="blogger-form-card">

      <!-- Error message -->
      {% if error %}
      <div class="blogger-error-msg">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
      </div>
      {% endif %}

      <!-- Raw HTML form — no Django Form class -->
      <form method="POST" action="{% url 'main:add_post_view' %}" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Title -->
        <div class="mb-4">
          <label class="blogger-field-label" for="title">
            <i class="bi bi-fonts me-1"></i>Post Title
          </label>
          <input
            type="text"
            id="title"
            name="title"
            class="blogger-field-input"
            placeholder="Enter your post title..."
            maxlength="2048"
            value="{{ request.POST.title|default:'' }}"
            required
          >
        </div>

        <!-- Content -->
        <div class="mb-4">
          <label class="blogger-field-label" for="content">
            <i class="bi bi-body-text me-1"></i>Content
          </label>
          <textarea
            id="content"
            name="content"
            class="blogger-field-textarea"
            placeholder="Write your story here..."
            required
          >{{ request.POST.content|default:'' }}</textarea>

          <input type="file" name="poster" class="form-control">
        </div>

        <hr class="blogger-divider">

        <!-- Actions -->
        <div class="d-flex align-items-center gap-3">
          <button type="submit" class="btn blogger-btn-gold blogger-btn-lg">
            <i class="bi bi-send-fill me-2"></i>Publish Post
          </button>
          <a href="{% url 'main:home_view' %}" style="color:var(--text-muted); font-size:0.9rem;">
            <i class="bi bi-x-lg me-1"></i>Cancel
          </a>
        </div>

      </form>
    </div>

  </div>
</section>

{% endblock %}
